  <!-- Shield shape - representing protection/law -->
  <path d="M256 100 L356 155 L356 280 C356 340 310 390 256 410 C202 390 156 340 156 280 L156 155 Z" 
        fill="rgba(255,255,255,0.12)" stroke="white" stroke-width="3"/>
  
  <!-- Balance/Scale -->
  <!-- Center pillar -->
  <line x1="256" y1="175" x2="256" y2="310" stroke="white" stroke-width="5" stroke-linecap="round"/>
  
  <!-- Top beam -->
  <line x1="196" y1="205" x2="316" y2="205" stroke="white" stroke-width="5" stroke-linecap="round"/>
  
  <!-- Left chain -->
